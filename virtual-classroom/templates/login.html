<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>{% block title %}Login - EduCloud{% endblock %}</title>
</head>
<body>
{% extends 'base.html' %}

{% block content %}
<div class="form-wrapper">
    <div class="form-card glass-panel">
        <div class="form-header">
            <h2>Welcome Back</h2>
            <p>Access your courses and study materials</p>
        </div>
        
        <form action="{{ url_for('login') }}" methods="POST" method="POST">
            <div class="form-group">
                <label for="email" class="form-label">Email Address</label>
                <input type="email" id="email" name="email" class="form-control" placeholder="name@domain.com" required autocomplete="email">
            </div>
            
            <div class="form-group">
                <label for="password" class="form-label">Password</label>
                <input type="password" id="password" name="password" class="form-control" placeholder="Enter your password" required autocomplete="current-password">
            </div>
            
            <button type="submit" class="btn btn-primary" style="width: 100%; margin-top: 16px;">
                <i class="fa-solid fa-arrow-right-to-bracket"></i> Login
            </button>
        </form>
        
        <div style="text-align: center; margin-top: 24px;">
            <p style="font-size: 0.85rem; color: var(--text-secondary);">
                Don't have an account? <a href="{{ url_for('register') }}" style="color: var(--color-primary); text-decoration: none; font-weight: 600;">Sign up</a>
            </p>
        </div>
    </div>
</div>
{% endblock %}
</body>
</html>
